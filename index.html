<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buitenzorg - TV Plattegrond</title>
    <style>
        :root {
            --buitenzorg-green: #2d5a27;
            --wood-brown: #8b5a2b;
            --bg-color: #1a1a1a;
            --text-main: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        /* --- Header (TV style) --- */
        .tv-header {
            background-color: var(--buitenzorg-green);
            height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 100;
        }

        .tv-logo { font-size: 2em; font-weight: bold; display: flex; align-items: center; gap: 15px;}
        
        .date-controls { display: flex; align-items: center; gap: 20px; }
        
        .date-btn {
            background: rgba(255,255,255,0.2); border: 2px solid white; color: white;
            font-size: 1.5em; width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: background 0.2s;
        }
        .date-btn:hover { background: rgba(255,255,255,0.4); }
        .date-btn:active { transform: scale(0.95); }
        
        .date-display { font-size: 2em; font-weight: bold; min-width: 320px; text-align: center; }

        .time-container { display: flex; align-items: center; }
        .time-display { font-size: 1.5em; opacity: 0.8; font-weight: bold; }

        /* Fullscreen knop */
        .fullscreen-btn {
            background: rgba(255,255,255,0.2); border: 2px solid white; color: white;
            font-size: 1.2em; width: 40px; height: 40px; border-radius: 8px;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            margin-left: 20px; transition: background 0.2s;
        }
        .fullscreen-btn:hover { background: rgba(255,255,255,0.4); }
        .fullscreen-btn:active { transform: scale(0.95); }

        /* --- Map Container --- */
        .map-container {
            position: relative; flex-grow: 1; width: 100%;
            background-color: #222; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        .map-image {
            display: block;
            max-width: 100vw;
            max-height: calc(100vh - 80px);
            width: auto;
            height: auto;
        }

        /* --- Overlays (Labels op de kaart) --- */
        .map-label {
            position: absolute;
            transform: translate(-50%, -50%); 
            color: white; padding: 6px 12px; border-radius: 8px;
            font-size: 1.1em; font-weight: bold; text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6); border: 2px solid white;
            white-space: nowrap;
            /* Geen CSS transition hier, anders raakt het anti-overlap script in de war door animaties! */
        }

        .map-label.green { background-color: var(--buitenzorg-green); z-index: 10; }
        .map-label.orange { background-color: #e67e22; z-index: 10; }
        
        .map-label.empty {
            background-color: #ffffff; 
            color: #333; border: 2px solid #999;
            font-size: 0.9em; padding: 4px 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            z-index: 5; /* Lege velden naar de achtergrond */
        }

        .group-name { display: block; font-size: 1.2em; text-shadow: 1px 1px 2px rgba(0,0,0,0.4); }
        .field-name { display: block; font-size: 0.75em; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;}
        .empty .field-name { font-weight: bold; color: #555; margin-bottom: 0;}

        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            justify-content: center; align-items: center; font-size: 2em; z-index: 200;
        }
    </style>
</head>
<body>

    <div class="tv-header">
        <div class="tv-logo">🏕️ Scoutcentrum Buitenzorg</div>
        <div class="date-controls">
            <button class="date-btn" onclick="changeDate(-1)">◀</button>
            <div class="date-display" id="dateDisplay" onclick="goToToday()" style="cursor: pointer;" title="Klik om naar Vandaag te gaan">Datum laden...</div>
            <button class="date-btn" onclick="changeDate(1)">▶</button>
        </div>
        <div class="time-container">
            <div class="time-display" id="clockDisplay">00:00</div>
            <button class="fullscreen-btn" onclick="toggleFullScreen()" title="Volledig scherm in/uitschakelen">⛶</button>
        </div>
    </div>

    <div class="map-container" id="mapWrapper">
        <div class="image-wrapper" id="imageWrapper">
            <img src="plattegrond.jpg" class="map-image" id="mapImage" alt="Plattegrond Buitenzorg">
        </div>
        <div class="loading-overlay" id="loadingOverlay">Actuele gegevens ophalen...</div>
    </div>

<script>
    // --- EXACTE COÖRDINATEN ---
    const mapCoordinates = {
        "pollenveld": { top: "36.9%", left: "23.4%", name: "Pollenveld" },
        "trenobos": { top: "49.3%", left: "28.9%", name: "Trenobos" },
        "smokkelpad": { top: "56.2%", left: "21.0%", name: "Smokkelpad" },
        "eekhoorntjesbos": { top: "67.7%", left: "11.4%", name: "Eekhoorntjesbos" },
        "varenveld": { top: "80.3%", left: "12.1%", name: "Varenveld" },
        "buizerdbos": { top: "64.1%", left: "25.5%", name: "Buizerdbos" },
        "kikkerbos": { top: "61.8%", left: "35.9%", name: "Kikkerbos" },
        "ganzennest": { top: "75.2%", left: "21.3%", name: "Ganzennest" },
        "ivoorkust": { top: "73.9%", left: "31.4%", name: "Ivoorkust" },
        "olifantenbos": { top: "73.2%", left: "40.8%", name: "Olifantenbos" },
        "eikenveld": { top: "60.6%", left: "45.5%", name: "Eikenveld" },
        "sparrenbos": { top: "67.5%", left: "54.2%", name: "Sparrenbos" },
        "movavedoveld": { top: "59.9%", left: "54.0%", name: "MOVAVEDO veld" },
        "beverbos": { top: "58.5%", left: "65.4%", name: "Beverbos" },
        "trekkersveld": { top: "48.6%", left: "73.0%", name: "Trekkersveld" },
        "open vallei": { top: "43.3%", left: "59.7%", name: "Open Vallei" },
        "vleermuizengrot": { top: "30.9%", left: "43.9%", name: "Vleermuizengrot" },
        "beverburcht": { top: "26.8%", left: "40.2%", name: "Beverburcht" },
        "uilennest": { top: "29.2%", left: "58.4%", name: "Uilennest" },
        "kabouterhuis": { top: "18.0%", left: "68.4%", name: "Kabouterhuis" }
    };

    const reservationUrl = "https://www.labelbooking.nl/calendar/reservation/all.ics?organisation=5cc47752-2b5a-4664-9f45-9748deea1939&user=273a8401-5005-47cc-8e8b-ededa19d847d";
    const proxies = [
        "https://corsproxy.io/?",
        "https://api.allorigins.win/raw?url=",
        "https://api.codetabs.com/v1/proxy?quest="
    ];

    let allReservations = [];
    let currentDate = new Date();
    currentDate.setHours(0,0,0,0);
    let userManuallyChangedDate = false;

    // --- KLOK EN AUTO-RENDER LOGICA ---
    let lastMinute = -1;
    setInterval(() => {
        const now = new Date();
        document.getElementById('clockDisplay').innerText = now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
        
        if (now.getMinutes() !== lastMinute) {
            lastMinute = now.getMinutes();
            if (!userManuallyChangedDate) {
                currentDate = new Date();
                currentDate.setHours(0,0,0,0);
            }
            renderMap();
        }
    }, 1000);

    // --- FULLSCREEN LOGICA ---
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                alert(`Volledig scherm mislukt: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) { document.exitFullscreen(); }
        }
    }

    // --- DATUM LOGICA ---
    function formatHeaderDate(dateObj) {
        let today = new Date(); today.setHours(0,0,0,0);
        let target = new Date(dateObj); target.setHours(0,0,0,0);
        let diffDays = Math.round((target - today) / (1000 * 60 * 60 * 24));
        
        let exactDate = dateObj.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        exactDate = exactDate.charAt(0).toUpperCase() + exactDate.slice(1);

        if (diffDays === 0) return `Vandaag - ${exactDate}`;
        if (diffDays === 1) return `Morgen - ${exactDate}`;
        if (diffDays === -1) return `Gisteren - ${exactDate}`;
        return exactDate;
    }

    function changeDate(days) {
        userManuallyChangedDate = true;
        currentDate.setDate(currentDate.getDate() + days);
        renderMap();
    }

    function goToToday() {
        userManuallyChangedDate = false;
        currentDate = new Date();
        currentDate.setHours(0,0,0,0);
        renderMap();
    }

    // --- ICS PARSERS ---
    function parseICSDate(str) {
        if (!str) return null;
        const numbers = str.replace(/[^0-9]/g, '');
        if (numbers.length < 8) return null;
        let y = parseInt(numbers.substring(0, 4)), m = parseInt(numbers.substring(4, 6)) - 1, d = parseInt(numbers.substring(6, 8));
        let hasTime = numbers.length >= 14;
        let h = hasTime ? parseInt(numbers.substring(8, 10)) : 0, min = hasTime ? parseInt(numbers.substring(10, 12)) : 0, s = hasTime ? parseInt(numbers.substring(12, 14)) : 0;
        return { date: new Date(y, m, d, h, min, s), hasTime: hasTime };
    }

    function parseICS(icsData) {
        const events = [];
        let currentEvent = null;
        const lines = icsData.split(/\r\n|\n|\r/);
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            while (i + 1 < lines.length && (lines[i+1].startsWith(' ') || lines[i+1].startsWith('\t'))) { i++; line += lines[i].substring(1); }
            if (line.startsWith('BEGIN:VEVENT')) currentEvent = {};
            else if (line.startsWith('END:VEVENT') && currentEvent) {
                if (currentEvent.startRaw) {
                    currentEvent.start = currentEvent.startRaw.date;
                    currentEvent.start.setHours(currentEvent.startRaw.hasTime ? currentEvent.start.getHours() : 0, currentEvent.startRaw.hasTime ? currentEvent.start.getMinutes() : 0, 0, 0); 
                    if (currentEvent.endRaw) {
                        if (!currentEvent.endRaw.hasTime) {
                            currentEvent.end = new Date(currentEvent.endRaw.date.getTime() - 1);
                            currentEvent.end.setHours(23,59,59,999);
                        } else currentEvent.end = new Date(currentEvent.endRaw.date.getTime());
                    } else {
                        currentEvent.end = new Date(currentEvent.start);
                        currentEvent.end.setHours(23,59,59,999);
                    }
                    events.push(currentEvent);
                }
                currentEvent = null;
            } else if (currentEvent) {
                if (line.startsWith('SUMMARY')) currentEvent.summary = line.substring(line.indexOf(':') + 1).replace(/\\,/g, ',');
                else if (line.startsWith('DESCRIPTION')) currentEvent.description = line.substring(line.indexOf(':') + 1).replace(/\\n/g, '\n').replace(/\\N/g, '\n').replace(/\\,/g, ',');
                else if (line.startsWith('LOCATION')) currentEvent.location = line.substring(line.indexOf(':') + 1).replace(/\\,/g, ',');
                else if (line.startsWith('DTSTART')) currentEvent.startRaw = parseICSDate(line.substring(line.indexOf(':') + 1));
                else if (line.startsWith('DTEND')) currentEvent.endRaw = parseICSDate(line.substring(line.indexOf(':') + 1));
            }
        }
        return events;
    }

    function extractDetails(text, fallbackLocation) {
        let result = { terrains: [], status: 'Onbekend' };
        if (text) {
            let mStatus = text.match(/Status:\s*([^\n]+)/i);
            if (mStatus) result.status = mStatus[1].trim();
        }
        if (!text) {
            if (fallbackLocation) result.terrains.push(fallbackLocation.replace(/^[\s-]+/, '').trim().toLowerCase());
            return result;
        }

        let bMatch = text.match(/Toegewezen gebouwen:\s*([\s\S]*?)(?=\n\n|\nToegewezen|\nKampstaf:|$)/i);
        if (bMatch && bMatch[1]) {
            bMatch[1].split('\n').forEach(l => {
                let clean = l.replace(/^[\s-]+/, '').trim();
                if(clean) result.terrains.push(clean.toLowerCase()); 
            });
        }
        
        let vMatch = text.match(/Toegewezen velden:\s*([\s\S]*?)(?=\n\n|\nToegewezen|\nKampstaf:|$)/i);
        if (vMatch && vMatch[1]) {
            vMatch[1].split('\n').forEach(l => {
                let clean = l.replace(/^[\s-]+/, '').trim();
                if(clean) result.terrains.push(clean.toLowerCase());
            });
        }
        if (result.terrains.length === 0 && fallbackLocation) {
            result.terrains.push(fallbackLocation.replace(/^[\s-]+/, '').trim().toLowerCase());
        }
        return result;
    }

    // --- 🛠️ ANTI-OVERLAP ALGORITME ---
    // Voorkomt dat label-blokjes onleesbaar over elkaar heen vallen
    function resolveCollisions() {
        const labels = Array.from(document.querySelectorAll('.map-label'));
        if (labels.length === 0) return;

        // Reset marges
        labels.forEach(l => l.style.marginTop = '0px');

        let collision = true;
        let loops = 0;
        
        while(collision && loops < 50) {
            collision = false;
            loops++;
            
            // Sorteer van boven naar beneden op basis van hun Y positie op het scherm
            labels.sort((a, b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top);

            for (let i = 0; i < labels.length; i++) {
                for (let j = i + 1; j < labels.length; j++) {
                    let rect1 = labels[i].getBoundingClientRect();
                    let rect2 = labels[j].getBoundingClientRect();
                    
                    let margin = 6; // 6 pixels tussenruimte tussen de blokjes

                    // Check of ze elkaar raken
                    if (!(rect1.right + margin < rect2.left || 
                          rect1.left > rect2.right + margin || 
                          rect1.bottom + margin < rect2.top || 
                          rect1.top > rect2.bottom + margin)) {
                        
                        collision = true;
                        
                        // Duw het onderste bordje (j) verder naar beneden
                        let currentMargin = parseFloat(labels[j].style.marginTop || 0);
                        let overlap = (rect1.bottom - rect2.top) + margin;
                        
                        labels[j].style.marginTop = (currentMargin + overlap) + "px";
                    }
                }
            }
        }
    }

    // --- RENDER DE KAART ---
    function renderMap() {
        document.getElementById('dateDisplay').innerText = formatHeaderDate(currentDate);

        document.querySelectorAll('.map-label').forEach(el => el.remove());

        let startOfDay = new Date(currentDate);
        startOfDay.setHours(0, 0, 0, 0);
        let endOfDay = new Date(currentDate);
        endOfDay.setHours(23, 59, 59, 999);

        let dailyRes = allReservations.filter(e => {
            return e.start <= endOfDay && e.end > startOfDay;
        });

        const imageWrapper = document.getElementById('imageWrapper');

        for (const [fieldKey, fieldData] of Object.entries(mapCoordinates)) {
            
            let fieldReservations = dailyRes.filter(r => 
                r.rawTerrains.some(t => t.includes(fieldKey) || fieldKey.includes(t))
            );

            fieldReservations.sort((a, b) => a.start - b.start);

            let activeRes = null;
            let displayState = 'empty';

            for (let r of fieldReservations) {
                let st = r.status ? r.status.toLowerCase() : "";
                
                if (st.includes('geannuleerd') || st.includes('vervallen') || st.includes('afgewezen')) continue; 
                if (st.includes('uitgecheckt') || st.includes('afgerond')) continue; 

                activeRes = r;
                
                if (st.includes('ingecheckt') || st.includes('aanwezig')) {
                    displayState = 'green';
                } else {
                    displayState = 'orange';
                }
                break; 
            }

            const label = document.createElement('div');
            label.style.top = fieldData.top;
            label.style.left = fieldData.left;

            if (activeRes && displayState !== 'empty') {
                label.className = `map-label ${displayState}`;
                
                let shortName = activeRes.summary;
                if(shortName.length > 25) shortName = shortName.substring(0, 22) + "...";

                label.innerHTML = `<span class="field-name">${fieldData.name}</span>
                                   <span class="group-name">${shortName}</span>`;
            } else {
                label.className = 'map-label empty';
                label.innerHTML = `<span class="field-name">${fieldData.name}</span>`;
            }

            imageWrapper.appendChild(label);
        }

        // Als alle labels geplaatst zijn, roep de Anti-Overlap functie aan
        // We doen dit in een kleine timeout zodat de browser tijd heeft de blokjes eerst te tekenen en meten.
        setTimeout(() => {
            resolveCollisions();
        }, 50);
    }

    // --- DATA OPHALEN ---
    async function fetchData() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const promises = proxies.map(async (proxy) => {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000); 
                try {
                    const res = await fetch(proxy + encodeURIComponent(reservationUrl), { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!res.ok) throw new Error('Proxy error');
                    const text = await res.text();
                    if (!text.includes('BEGIN:VCALENDAR')) throw new Error('Geen ICS');
                    return text;
                } catch (err) {
                    clearTimeout(timeoutId); throw err; 
                }
            });
            const data = await Promise.any(promises);
            
            allReservations = [];
            let rEvents = parseICS(data);
            rEvents.forEach(e => {
                let details = extractDetails(e.description, e.location);
                e.rawTerrains = details.terrains;
                e.status = details.status;
                allReservations.push(e);
            });

            renderMap();
        } catch (e) {
            console.error("Fout bij laden data", e);
            document.getElementById('loadingOverlay').innerText = "Oeps! Kan data niet laden.";
            setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 3000);
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    setInterval(() => { fetchData(); }, 5 * 60 * 1000);

    fetchData();
</script>
</body>
</html>
