<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buitenzorg - TV Plattegrond</title>
    <style>
        :root {
            --buitenzorg-green: #2d5a27;
            --wood-brown: #8b5a2b;
            --bg-color: #1a1a1a;
            --text-main: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        /* --- Header (TV style) --- */
        .tv-header {
            background-color: var(--buitenzorg-green);
            height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 100;
        }

        .tv-logo { font-size: 2em; font-weight: bold; display: flex; align-items: center; gap: 15px;}
        
        .date-controls { display: flex; align-items: center; gap: 20px; }
        
        .date-btn {
            background: rgba(255,255,255,0.2); border: 2px solid white; color: white;
            font-size: 1.5em; width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: background 0.2s;
        }
        .date-btn:hover { background: rgba(255,255,255,0.4); }
        .date-btn:active { transform: scale(0.95); }
        
        .date-display { 
            font-size: 2em; font-weight: bold; min-width: 320px; text-align: center;
            cursor: pointer; padding: 5px 15px; border-radius: 8px; transition: background 0.2s;
        }
        .date-display:hover { background: rgba(255,255,255,0.1); }

        .time-container { display: flex; align-items: center; }
        .time-display { font-size: 1.5em; opacity: 0.8; font-weight: bold; margin-right: 10px;}

        /* Rechterknoppen (Actueel & Fullscreen) */
        .header-action-btn {
            background: rgba(255,255,255,0.2); border: 2px solid white; color: white;
            font-size: 1.2em; height: 40px; border-radius: 8px;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            margin-left: 15px; transition: background 0.2s; font-weight: bold;
            padding: 0 15px;
        }
        .header-action-btn.icon-only { width: 40px; padding: 0; }
        .header-action-btn:hover { background: rgba(255,255,255,0.4); }
        .header-action-btn:active { transform: scale(0.95); }

        /* --- Map Container --- */
        .map-container {
            position: relative; flex-grow: 1; width: 100%;
            background-color: #222; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
        }

        .map-image {
            display: block;
            max-width: 100vw;
            max-height: calc(100vh - 80px);
            width: auto;
            height: auto;
        }

        /* --- Kampstaf Overlay --- */
        .staff-overlay {
            position: absolute;
            top: 25px;
            left: 25px;
            background-color: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.4em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 50;
            border-left: 6px solid var(--buitenzorg-green);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .staff-overlay strong { color: var(--buitenzorg-green); font-weight: 800; }

        /* --- Overlays (Labels op de kaart) --- */
        .map-label {
            position: absolute;
            transform: translate(-50%, -50%); 
            color: white; padding: 6px 12px; border-radius: 8px;
            font-size: 1.1em; font-weight: bold; text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6); border: 2px solid white;
            white-space: nowrap; z-index: 10;
        }

        /* Kleuren Status Logica */
        .map-label.green { background-color: var(--buitenzorg-green); }
        .map-label.orange { background-color: #e67e22; }
        .map-label.red { background-color: #e74c3c; }
        .map-label.gray { background-color: #7f8c8d; }
        
        .map-label.empty {
            background-color: #ffffff; 
            color: #333; border: 2px solid #999;
            font-size: 0.9em; padding: 4px 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            z-index: 5; 
        }

        .group-name { display: block; font-size: 1.2em; text-shadow: 1px 1px 2px rgba(0,0,0,0.4); }
        .field-name { display: block; font-size: 0.75em; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;}
        .empty .field-name { font-weight: bold; color: #555; margin-bottom: 0;}

        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            justify-content: center; align-items: center; font-size: 2em; z-index: 200;
        }

        /* --- Modal & Kalender Pop-up --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center;
            z-index: 2000; backdrop-filter: blur(2px);
        }
        .calendar-modal {
            background: white; border-radius: 16px; padding: 25px; width: 90%; max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: #333;
        }
        .cal-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }
        .cal-header h2 { margin: 0; color: var(--wood-brown); font-size: 1.8em; }
        .cal-nav-btn {
            background: #f1f5f1; border: none; color: var(--buitenzorg-green); font-size: 1.5em;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-weight: bold;
            display: flex; justify-content: center; align-items: center; transition: background 0.2s;
        }
        .cal-nav-btn:hover { background: #e0e8e0; }
        .cal-nav-btn:active { transform: scale(0.95); }
        
        .cal-grid-header {
            display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
            font-weight: bold; color: #888; font-size: 1.1em; margin-bottom: 10px;
        }
        .cal-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
        }
        .cal-day {
            aspect-ratio: 1; display: flex; justify-content: center; align-items: center;
            border-radius: 50%; font-weight: bold; color: #333; cursor: pointer; font-size: 1.3em;
            transition: all 0.2s;
        }
        .cal-day:hover:not(.empty) { background: #f0f0f0; transform: scale(1.05); }
        .cal-day.empty { background: none; cursor: default; }
        .cal-day.selected { background: var(--buitenzorg-green); color: white; box-shadow: 0 4px 10px rgba(45,90,39,0.4); }
        .cal-day.is-today:not(.selected) { border: 2px solid var(--buitenzorg-green); color: var(--buitenzorg-green); }
    </style>
</head>
<body>

    <div class="tv-header">
        <div class="tv-logo">🏕️ Scoutingcentrum Buitenzorg</div>
        
        <div class="date-controls">
            <button class="date-btn" onclick="changeDate(-1)">◀</button>
            <div class="date-display" id="dateDisplay" onclick="openCalendar()" title="Kies een andere datum">Datum laden...</div>
            <button class="date-btn" onclick="changeDate(1)">▶</button>
        </div>
        
        <div class="time-container">
            <div class="time-display" id="clockDisplay">00:00</div>
            <button class="header-action-btn" onclick="goToToday()" title="Terug naar de weergave van dit moment">Actueel</button>
            <button class="header-action-btn icon-only" onclick="toggleFullScreen()" title="Volledig scherm in/uitschakelen">⛶</button>
        </div>
    </div>

    <div class="map-container" id="mapWrapper">
        <div class="image-wrapper" id="imageWrapper">
            <img src="https://buitenzorg.scouting.nl/images/Fotos/Plattegrond%202025.jpg" class="map-image" id="mapImage" alt="Plattegrond Buitenzorg">
            
            <div class="staff-overlay" id="staffOverlay">🧑‍🌾 Staf: <strong>Laden...</strong></div>
        </div>
        <div class="loading-overlay" id="loadingOverlay">Actuele gegevens ophalen...</div>
    </div>

    <div class="modal-overlay" id="calendarModal" onclick="closeCalendarModal(event)">
        <div class="calendar-modal" onclick="event.stopPropagation()">
            <div class="cal-header">
                <button class="cal-nav-btn" onclick="changeCalMonth(-1)">◀</button>
                <h2 id="calMonthDisplay">Maand Jaar</h2>
                <button class="cal-nav-btn" onclick="changeCalMonth(1)">▶</button>
            </div>
            <div class="cal-grid-header">
                <div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </div>
    </div>

<script>
    // --- EXACTE COÖRDINATEN ---
    const mapCoordinates = {
        "pollenveld": { top: "36.9%", left: "23.4%", name: "Pollenveld" },
        "trenobos": { top: "49.3%", left: "28.9%", name: "Trenobos" },
        "smokkelpad": { top: "56.2%", left: "21.0%", name: "Smokkelpad" },
        "eekhoorntjesbos": { top: "67.7%", left: "11.4%", name: "Eekhoorntjesbos" },
        "varenveld": { top: "80.3%", left: "12.1%", name: "Varenveld" },
        "buizerdbos": { top: "64.1%", left: "25.5%", name: "Buizerdbos" },
        "kikkerbos": { top: "61.8%", left: "35.9%", name: "Kikkerbos" },
        "ganzennest": { top: "75.2%", left: "21.3%", name: "Ganzennest" },
        "ivoorkust": { top: "73.9%", left: "31.4%", name: "Ivoorkust" },
        "olifantenbos": { top: "73.2%", left: "42.0%", name: "Olifantenbos" },
        "eikenveld": { top: "60.6%", left: "45.0%", name: "Eikenveld" },
        "sparrenbos": { top: "67.5%", left: "54.2%", name: "Sparrenbos" },
        "movavedoveld": { top: "59.9%", left: "55.0%", name: "MOVAVEDO veld" },
        "beverbos": { top: "58.5%", left: "65.4%", name: "Beverbos" },
        "trekkersveld": { top: "48.6%", left: "73.0%", name: "Trekkersveld" },
        "open vallei": { top: "43.3%", left: "59.7%", name: "Open Vallei" },
        "paul's plekje": { top: "50.3%", left: "45.7%", name: "Paul's Plekje" },
        "vleermuizengrot": { top: "26.8%", left: "40.2%", name: "Vleermuizengrot" },
        "beverburcht": { top: "30.9%", left: "43.9%", name: "Beverburcht" },
        "uilennest": { top: "29.2%", left: "58.4%", name: "Uilennest" },
        "kabouterhuis": { top: "18.0%", left: "68.4%", name: "Kabouterhuis" }
    };

    const reservationUrl = "https://www.labelbooking.nl/calendar/reservation/all.ics?organisation=5cc47752-2b5a-4664-9f45-9748deea1939&user=273a8401-5005-47cc-8e8b-ededa19d847d";
    const planningUrl = "https://www.labelbooking.nl/calendar/planning/all.ics?organisation=5cc47752-2b5a-4664-9f45-9748deea1939&user=273a8401-5005-47cc-8e8b-ededa19d847d";
    
    // Robuustere volgorde van proxy's
    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://api.codetabs.com/v1/proxy?quest="
    ];

    let allReservations = [];
    let allStaff = [];
    let currentDate = new Date();
    currentDate.setHours(0,0,0,0);
    let userManuallyChangedDate = false;
    let calViewDate = new Date();

    // --- KLOK EN AUTO-RENDER LOGICA ---
    let lastMinute = -1;
    setInterval(() => {
        const now = new Date();
        document.getElementById('clockDisplay').innerText = now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
        
        if (now.getMinutes() !== lastMinute) {
            lastMinute = now.getMinutes();
            if (!userManuallyChangedDate) {
                currentDate = new Date();
                currentDate.setHours(0,0,0,0);
            }
            renderMap();
        }
    }, 1000);

    // --- FULLSCREEN LOGICA ---
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                alert(`Volledig scherm mislukt: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) { document.exitFullscreen(); }
        }
    }

    // --- DATUM EN KALENDER LOGICA ---
    function formatHeaderDate(dateObj) {
        let exactDate = dateObj.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        return exactDate.charAt(0).toUpperCase() + exactDate.slice(1);
    }

    function changeDate(days) {
        userManuallyChangedDate = true;
        currentDate.setDate(currentDate.getDate() + days);
        checkIfToday();
        renderMap();
    }

    function goToToday() {
        userManuallyChangedDate = false;
        currentDate = new Date();
        currentDate.setHours(0,0,0,0);
        document.getElementById('calendarModal').style.display = 'none';
        renderMap();
    }

    function checkIfToday() {
        let today = new Date();
        if (currentDate.getDate() === today.getDate() && currentDate.getMonth() === today.getMonth() && currentDate.getFullYear() === today.getFullYear()) {
            userManuallyChangedDate = false; 
        }
    }

    function openCalendar() {
        calViewDate = new Date(currentDate); 
        renderCalendarGrid();
        document.getElementById('calendarModal').style.display = 'flex';
    }

    function closeCalendarModal(e) {
        if (e.target === document.getElementById('calendarModal')) {
            document.getElementById('calendarModal').style.display = 'none';
        }
    }

    function changeCalMonth(offset) {
        calViewDate.setMonth(calViewDate.getMonth() + offset);
        renderCalendarGrid();
    }

    function selectDateFromCalendar(y, m, d) {
        userManuallyChangedDate = true;
        currentDate = new Date(y, m, d, 0, 0, 0);
        checkIfToday();
        
        document.getElementById('calendarModal').style.display = 'none';
        renderMap(); 
    }

    function renderCalendarGrid() {
        const year = calViewDate.getFullYear();
        const month = calViewDate.getMonth();
        const monthNames = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];
        
        document.getElementById('calMonthDisplay').textContent = `${monthNames[month]} ${year}`;

        let firstDay = new Date(year, month, 1).getDay();
        let daysInMonth = new Date(year, month + 1, 0).getDate();
        firstDay = firstDay === 0 ? 7 : firstDay;

        let html = '';
        for (let i = 1; i < firstDay; i++) { html += `<div class="cal-day empty"></div>`; }
        
        let today = new Date();
        for (let i = 1; i <= daysInMonth; i++) {
            let isSelected = (year === currentDate.getFullYear() && month === currentDate.getMonth() && i === currentDate.getDate());
            let isToday = (year === today.getFullYear() && month === today.getMonth() && i === today.getDate());
            
            let classes = "cal-day";
            if (isSelected) classes += " selected";
            if (isToday) classes += " is-today";

            html += `<div class="${classes}" onclick="selectDateFromCalendar(${year}, ${month}, ${i})">${i}</div>`;
        }
        document.getElementById('calGrid').innerHTML = html;
    }

    // --- ICS PARSERS ---
    function parseICSDate(str) {
        if (!str) return null;
        const numbers = str.replace(/[^0-9]/g, '');
        if (numbers.length < 8) return null;
        let y = parseInt(numbers.substring(0, 4)), m = parseInt(numbers.substring(4, 6)) - 1, d = parseInt(numbers.substring(6, 8));
        let hasTime = numbers.length >= 14;
        let h = hasTime ? parseInt(numbers.substring(8, 10)) : 0, min = hasTime ? parseInt(numbers.substring(10, 12)) : 0, s = hasTime ? parseInt(numbers.substring(12, 14)) : 0;
        return { date: new Date(y, m, d, h, min, s), hasTime: hasTime };
    }

    function parseICS(icsData) {
        const events = [];
        let currentEvent = null;
        const lines = icsData.split(/\r\n|\n|\r/);
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            while (i + 1 < lines.length && (lines[i+1].startsWith(' ') || lines[i+1].startsWith('\t'))) { i++; line += lines[i].substring(1); }
            if (line.startsWith('BEGIN:VEVENT')) currentEvent = {};
            else if (line.startsWith('END:VEVENT') && currentEvent) {
                if (currentEvent.startRaw) {
                    currentEvent.start = currentEvent.startRaw.date;
                    currentEvent.start.setHours(currentEvent.startRaw.hasTime ? currentEvent.start.getHours() : 0, currentEvent.startRaw.hasTime ? currentEvent.start.getMinutes() : 0, 0, 0); 
                    if (currentEvent.endRaw) {
                        if (!currentEvent.endRaw.hasTime) {
                            currentEvent.end = new Date(currentEvent.endRaw.date.getTime() - 1);
                            currentEvent.end.setHours(23,59,59,999);
                        } else currentEvent.end = new Date(currentEvent.endRaw.date.getTime());
                    } else {
                        currentEvent.end = new Date(currentEvent.start);
                        currentEvent.end.setHours(23,59,59,999);
                    }
                    events.push(currentEvent);
                }
                currentEvent = null;
            } else if (currentEvent) {
                if (line.startsWith('SUMMARY')) currentEvent.summary = line.substring(line.indexOf(':') + 1).replace(/\\,/g, ',');
                else if (line.startsWith('DESCRIPTION')) currentEvent.description = line.substring(line.indexOf(':') + 1).replace(/\\n/g, '\n').replace(/\\N/g, '\n').replace(/\\,/g, ',');
                else if (line.startsWith('LOCATION')) currentEvent.location = line.substring(line.indexOf(':') + 1).replace(/\\,/g, ',');
                else if (line.startsWith('DTSTART')) currentEvent.startRaw = parseICSDate(line.substring(line.indexOf(':') + 1));
                else if (line.startsWith('DTEND')) currentEvent.endRaw = parseICSDate(line.substring(line.indexOf(':') + 1));
            }
        }
        return events;
    }

    function extractDetails(text, fallbackLocation) {
        let result = { terrains: [], status: 'Onbekend' };
        if (text) {
            let mStatus = text.match(/Status:\s*([^\n]+)/i);
            if (mStatus) result.status = mStatus[1].trim();
        }
        if (!text) {
            if (fallbackLocation) result.terrains.push(fallbackLocation.replace(/^[\s-]+/, '').trim().toLowerCase());
            return result;
        }

        let bMatch = text.match(/Toegewezen gebouwen:\s*([\s\S]*?)(?=\n\n|\nToegewezen|\nKampstaf:|$)/i);
        if (bMatch && bMatch[1]) {
            bMatch[1].split('\n').forEach(l => {
                let clean = l.replace(/^[\s-]+/, '').trim();
                if(clean) result.terrains.push(clean.toLowerCase()); 
            });
        }
        
        let vMatch = text.match(/Toegewezen velden:\s*([\s\S]*?)(?=\n\n|\nToegewezen|\nKampstaf:|$)/i);
        if (vMatch && vMatch[1]) {
            vMatch[1].split('\n').forEach(l => {
                let clean = l.replace(/^[\s-]+/, '').trim();
                if(clean) result.terrains.push(clean.toLowerCase());
            });
        }
        if (result.terrains.length === 0 && fallbackLocation) {
            result.terrains.push(fallbackLocation.replace(/^[\s-]+/, '').trim().toLowerCase());
        }
        return result;
    }

    // --- ANTI-OVERLAP ALGORITME ---
    function resolveCollisions() {
        const labels = Array.from(document.querySelectorAll('.map-label'));
        if (labels.length === 0) return;

        labels.forEach(l => l.style.marginTop = '0px');

        let collision = true;
        let loops = 0;
        
        while(collision && loops < 50) {
            collision = false;
            loops++;
            
            labels.sort((a, b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top);

            for (let i = 0; i < labels.length; i++) {
                for (let j = i + 1; j < labels.length; j++) {
                    let rect1 = labels[i].getBoundingClientRect();
                    let rect2 = labels[j].getBoundingClientRect();
                    
                    let margin = 6;

                    if (!(rect1.right + margin < rect2.left || 
                          rect1.left > rect2.right + margin || 
                          rect1.bottom + margin < rect2.top || 
                          rect1.top > rect2.bottom + margin)) {
                        
                        collision = true;
                        
                        let currentMargin = parseFloat(labels[j].style.marginTop || 0);
                        let overlap = (rect1.bottom - rect2.top) + margin;
                        
                        labels[j].style.marginTop = (currentMargin + overlap) + "px";
                    }
                }
            }
        }
    }

    // --- RENDER DE KAART ---
    function renderMap() {
        document.getElementById('dateDisplay').innerHTML = `${formatHeaderDate(currentDate)} <span style="font-size: 0.7em; opacity: 0.8; margin-left: 10px;">📅</span>`;

        document.querySelectorAll('.map-label').forEach(el => el.remove());

        let startOfDay = new Date(currentDate);
        startOfDay.setHours(0, 0, 0, 0);
        let endOfDay = new Date(currentDate);
        endOfDay.setHours(23, 59, 59, 999);

        // 1. Render Kampstaf
        let todaysStaff = allStaff.filter(e => e.start <= endOfDay && e.end >= currentDate);
        let firstNames = [...new Set(todaysStaff.map(s => s.summary.split(' ')[0]))].join(', ');
        
        const staffOverlay = document.getElementById('staffOverlay');
        if (firstNames) {
            staffOverlay.innerHTML = `🧑‍🌾 Staf: <strong>${firstNames}</strong>`;
            staffOverlay.style.display = 'flex';
        } else {
            staffOverlay.style.display = 'none'; 
        }

        // 2. Render Velden
        let dailyRes = allReservations.filter(e => {
            return e.start <= endOfDay && e.end > startOfDay;
        });

        const imageWrapper = document.getElementById('imageWrapper');
        let realNow = new Date(); 

        for (const [fieldKey, fieldData] of Object.entries(mapCoordinates)) {
            
            let fieldReservations = dailyRes.filter(r => 
                r.rawTerrains.some(t => t.includes(fieldKey) || fieldKey.includes(t))
            );

            fieldReservations.sort((a, b) => a.start - b.start);

            let activeRes = null;
            let displayState = 'empty';

            for (let r of fieldReservations) {
                let st = r.status ? r.status.toLowerCase() : "";
                
                if (st.includes('geannuleerd') || st.includes('vervallen') || st.includes('afgewezen')) continue; 
                if (st.includes('uitgecheckt') || st.includes('afgerond')) continue; 

                activeRes = r;
                
                let isCheckedIn = st.includes('ingecheckt') || st.includes('aanwezig');
                let arrivingRealToday = r.start.getDate() === realNow.getDate() && r.start.getMonth() === realNow.getMonth() && r.start.getFullYear() === realNow.getFullYear();
                let departingRealToday = r.end.getDate() === realNow.getDate() && r.end.getMonth() === realNow.getMonth() && r.end.getFullYear() === realNow.getFullYear();

                if (isCheckedIn) {
                    if (r.end < realNow) displayState = 'red';
                    else if (departingRealToday) displayState = 'orange';
                    else displayState = 'green';
                } else {
                    if (r.start < realNow) displayState = 'red';
                    else if (arrivingRealToday) displayState = 'orange';
                    else displayState = 'gray';
                }
                break; 
            }

            const label = document.createElement('div');
            label.style.top = fieldData.top;
            label.style.left = fieldData.left;

            if (activeRes && displayState !== 'empty') {
                label.className = `map-label ${displayState}`;
                
                let shortName = activeRes.summary.replace(/\s*\([^)]*\)$/, '').trim();
                if(shortName.length > 25) shortName = shortName.substring(0, 22) + "...";

                label.innerHTML = `<span class="field-name">${fieldData.name}</span>
                                   <span class="group-name">${shortName}</span>`;
            } else {
                label.className = 'map-label empty';
                label.innerHTML = `<span class="field-name">${fieldData.name}</span>`;
            }

            imageWrapper.appendChild(label);
        }

        setTimeout(() => {
            resolveCollisions();
        }, 50);
    }

    // --- SEQUENTIEEL DATA OPHALEN (Voorkomt blokkades) ---
    async function fetchICS(url) {
        for (let proxy of proxies) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000); 
                const res = await fetch(proxy + encodeURIComponent(url), { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (!res.ok) continue;
                
                const text = await res.text();
                if (text.includes('BEGIN:VCALENDAR')) {
                    return text;
                }
            } catch (err) {
                // Foutje? Probeer gewoon rustig de volgende proxy.
            }
        }
        return null;
    }

    async function fetchData() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            // Eerst halen we de reserveringen op
            const resData = await fetchICS(reservationUrl);
            if (resData) {
                allReservations = [];
                parseICS(resData).forEach(e => {
                    let details = extractDetails(e.description, e.location);
                    e.rawTerrains = details.terrains;
                    e.status = details.status;
                    allReservations.push(e);
                });
            }

            // Daarna halen we pas de planning op (zo voorkomen we een anti-spam rate-limit)
            const planData = await fetchICS(planningUrl);
            if (planData) {
                allStaff = [];
                parseICS(planData).forEach(e => {
                    let s = e.summary ? e.summary.toLowerCase() : '';
                    let d = e.description ? e.description.toLowerCase() : '';
                    if (!['klusteam','evenement','vakantie'].some(x => s.includes(x) || d.includes(x))) {
                        let names = e.summary ? e.summary.split(',') : ['Onbekend'];
                        names.forEach(name => {
                            let cleanName = name.trim();
                            if (cleanName) allStaff.push({ ...e, summary: cleanName });
                        });
                    }
                });
            }

            renderMap();
        } catch (e) {
            console.error("Fout bij laden data", e);
            document.getElementById('loadingOverlay').innerText = "Oeps! Kan data niet laden.";
            setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 3000);
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    setInterval(() => { fetchData(); }, 5 * 60 * 1000);

    fetchData();

    // =========================================================================
    // 🛠️ KALIBRATIE TOOL 
    // =========================================================================
    if (window.location.search.includes('edit=true')) {
        document.getElementById('mapImage').style.cursor = "crosshair";
        document.getElementById('mapImage').addEventListener('click', function(e) {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const leftPercent = ((x / rect.width) * 100).toFixed(1);
            const topPercent = ((y / rect.height) * 100).toFixed(1);
            
            prompt("Kopieer deze coördinaten en plak ze bij het juiste veld in de code:", `{ top: "${topPercent}%", left: "${leftPercent}%" }`);
        });
    }

</script>
